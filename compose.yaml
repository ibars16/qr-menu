services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qr-menu-php
    ports:
      - "8083:8000"
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "composer install && php -S 0.0.0.0:8000 -t public"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://qrmenu:qrmenu@postgres:5432/qrmenu?serverVersion=16&charset=utf8"

  postgres:
    image: postgres:16-alpine
    container_name: qr-menu-postgres
    environment:
      POSTGRES_DB: qrmenu
      POSTGRES_USER: qrmenu
      POSTGRES_PASSWORD: qrmenu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrmenu -d qrmenu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
