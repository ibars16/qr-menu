allergens:
    computed_title: Dai tuoi ingredienti
    computed_hint: Calcolato automaticamente in base agli ingredienti qui sotto — modifica gli allergeni di un ingrediente, oppure aggiungi un'eccezione specifica per questo piatto se necessario.
    computed_empty: Nessun allergene rilevato negli ingredienti attuali.
    your_ingredients_title: Allergeni dei tuoi ingredienti
    your_ingredients_hint: Condiviso con ogni altro piatto che usa lo stesso ingrediente.
    new_ingredient_hint: Salva prima il piatto per poter etichettare gli allergeni degli ingredienti appena aggiunti.
    overrides_title: Eccezioni specifiche del piatto
    overrides_hint: Utile per rischio di contaminazione crociata, o per correggere un allergene calcolato automaticamente.
    add_exception: Aggiungi eccezione
    select_allergen: Seleziona un allergene…
    presence_contains: Contiene
    presence_may_contain: Può contenere tracce
    presence_free_from: Confermato assente
    note_placeholder: 'Nota (obbligatoria per "assente")'
    remove: Rimuovi
    source_computed_label: dagli ingredienti
    advanced_title: Casi speciali di allergeni
    advanced_hint: Usa questa sezione solo se gli allergeni rilevati automaticamente non sono sufficienti — ad esempio per contaminazione crociata o perché questo piatto utilizza un ingrediente alternativo certificato senza quell'allergene.
    help_computed: Questi allergeni vengono rilevati automaticamente in base agli ingredienti di questo piatto. Nella maggior parte dei casi non è necessario modificare nulla.
    help_contains: L'allergene è presente intenzionalmente perché uno o più ingredienti lo contengono.
    help_may_contain: Usalo quando c'è rischio di contaminazione crociata — ad esempio perché la stessa friggitrice, forno o area di preparazione è condivisa con alimenti che contengono questo allergene.
    help_free_from: Usa questa opzione solo se sei certo che questo piatto sia realmente privo di questo allergene (ad esempio perché usi un sostituto certificato). Va usata solo in casi eccezionali.
    help_product_exception: Sostituisce gli allergeni calcolati automaticamente solo per questo piatto.
    help_cross_contamination: La contaminazione crociata si verifica quando un allergene finisce accidentalmente in un piatto a causa di attrezzature, olio di cottura o superfici condivise, anche se nessun ingrediente del piatto lo contiene.

