title: Importar menu

action:
    back_to_menu: Voltar ao menu

upload:
    intro: 'Carregue fotos do seu menu impresso e nós as lemos por si — uma foto por página está bem.'
    drop_text: Arraste as fotos do seu menu para aqui, ou toque para escolher ficheiros
    drop_hint: Adicione quantas precisar
