allergens:
    computed_title: Aus deinen Zutaten
    computed_hint: Wird automatisch aus den untenstehenden Zutaten berechnet — bearbeite die Allergene einer Zutat oder füge bei Bedarf eine gerichtsspezifische Ausnahme hinzu.
    computed_empty: In den aktuellen Zutaten wurden keine Allergene erkannt.
    your_ingredients_title: Allergene deiner Zutaten
    your_ingredients_hint: Wird mit jedem anderen Gericht geteilt, das dieselbe Zutat verwendet.
    new_ingredient_hint: Speichere das Gericht zuerst, um Allergene für neu hinzugefügte Zutaten zu markieren.
    overrides_title: Gerichtsspezifische Ausnahmen
    overrides_hint: Nützlich bei Kreuzkontaminationsrisiko oder um ein automatisch berechnetes Allergen zu korrigieren.
    add_exception: Ausnahme hinzufügen
    select_allergen: Allergen auswählen…
    presence_contains: Enthält
    presence_may_contain: Kann Spuren enthalten
    presence_free_from: Bestätigt frei von
    note_placeholder: 'Notiz (erforderlich bei "frei von")'
    remove: Entfernen
    source_computed_label: aus Zutaten
    advanced_title: Besondere Allergenfälle
    advanced_hint: Nutze diesen Bereich nur, wenn die automatisch erkannten Allergene nicht ausreichen — zum Beispiel bei Kreuzkontamination oder wenn dieses Gericht eine zertifizierte allergenfreie Alternativzutat verwendet.
    help_computed: Diese Allergene werden automatisch anhand der Zutaten dieses Gerichts erkannt. In den meisten Fällen musst du nichts ändern.
    help_contains: Das Allergen ist absichtlich enthalten, weil eine oder mehrere Zutaten es enthalten.
    help_may_contain: Verwende dies bei einem Risiko der Kreuzkontamination — zum Beispiel weil dieselbe Fritteuse, derselbe Ofen oder derselbe Zubereitungsbereich mit allergenhaltigen Speisen geteilt wird.
    help_free_from: Verwende dies nur, wenn du sicher bist, dass dieses Gericht tatsächlich frei von diesem Allergen ist (zum Beispiel weil du einen zertifizierten allergenfreien Ersatz verwendest). Dies sollte nur in Ausnahmefällen verwendet werden.
    help_product_exception: Überschreibt die automatisch berechneten Allergene nur für dieses Gericht.
    help_cross_contamination: Kreuzkontamination entsteht, wenn ein Allergen durch gemeinsam genutzte Geräte, Kochöl oder Oberflächen versehentlich in ein Gericht gelangt — selbst wenn keine der Zutaten des Gerichts es enthält.

