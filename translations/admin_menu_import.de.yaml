title: Speisekarte importieren

action:
    back_to_menu: Zurück zur Speisekarte

upload:
    intro: 'Lade Fotos deiner gedruckten Speisekarte hoch — wir lesen sie für dich ein. Ein Foto pro Seite reicht.'
    drop_text: Ziehe deine Menüfotos hierher oder tippe, um Dateien auszuwählen
    drop_hint: Füge so viele hinzu, wie du brauchst
    submit: Speisekarte jetzt einlesen
    uploading: Deine Fotos werden hochgeladen…
    upload_failed: Hochladen fehlgeschlagen — bitte prüfe deine Verbindung und versuche es erneut.
    retry: Erneut versuchen
    error:
        no_files: Bitte wähle mindestens ein Foto aus.
        too_many_files: 'Bitte lade höchstens %max% Fotos gleichzeitig hoch.'
        invalid_file: '„%name%" konnte nicht hochgeladen werden — bitte versuche es erneut.'
        unsupported_type: '„%name%" ist kein unterstützter Bildtyp. Bitte verwende JPEG, PNG oder WebP.'
        storage_failed: '„%name%" konnte nicht gespeichert werden — bitte versuche es erneut.'

status:
    reading:
        title: 'Seite %position% von %total% wird gelesen'
        sub: Wir lesen jedes Gericht sorgfältig.
        sub_slow_page: Diese Seite hat viele Details — wir lesen noch.
        sub_slow_global: Das dauert etwas länger als gewöhnlich — größere Speisekarten können ein paar Minuten dauern.
    organizing:
        title: Deine Gerichte werden organisiert
        sub: Kategorien werden gruppiert und Zutaten zugeordnet.
    done_title: Fertig
    reconnecting: Verbindung wird wiederhergestellt…
    trust: 'Du kannst diesen Tab bedenkenlos verlassen — wir arbeiten im Hintergrund weiter.'
    page_label: 'Seite %position%'
    page_status:
        pending: Wartend
        analyzing: Wird analysiert…
        extracted: Eingelesen
        failed: Fehlgeschlagen

complete:
    title_success: Deine Speisekarte ist bereit zur Überprüfung
    subtitle_success: Wir haben deine Gerichte zur Speisekarte hinzugefügt — für Kunden unsichtbar, bis du sie überprüfst.
    subtitle_partial_failure: ' Wir konnten %failed% von %total% Fotos nicht lesen — du kannst diese separat erneut hochladen.'
    stat_categories: Kategorien
    stat_products: Gerichte
    button_continue: Speisekarte ansehen
    title_failed: Wir konnten deine Speisekarte nicht lesen
    subtitle_failed: Keines deiner Fotos konnte verarbeitet werden. Bitte prüfe, ob es sich um klare, gut beleuchtete Fotos einer Speisekarte handelt, und versuche es erneut.
    button_retry: Erneut versuchen
