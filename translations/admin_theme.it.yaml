layout:
    standard:
        name: Standard
        desc: Schede con immagine sopra e nome sotto. Equilibrato ed efficace.
    compact:
        name: Lista compatta
        desc: Righe numerate, veloci da scorrere. Ideale per menu lunghi.
    grid:
        name: Griglia
        desc: Schede verticali con immagine grande. Molto visivo ed efficace.

theme:
    classic-dark:
        name: Classico scuro
        desc: Sfondo nero, accento del colore del tuo brand. Elegante e raffinato.
    classic-warm:
        name: Classico caldo
        desc: Sfondo crema, toni caldi. Accogliente e familiare.
    glass:
        name: Glassmorphism
        desc: Gradiente scuro con effetto vetro e accento viola. Moderno e premium.
    ocean:
        name: Oceano
        desc: Azzurro chiaro, pulito e fresco. Ideale per cucina di mare.
    noir:
        name: Noir
        desc: Nero profondo con dettagli dorati. Lusso e alta cucina.
    forest:
        name: Foresta
        desc: Verde naturale e organico. Perfetto per cucina di mercato e prodotti locali.
    terra:
        name: Terra
        desc: Terracotta mediterranea. Ideale per tapas, pintxos e cucina informale.
