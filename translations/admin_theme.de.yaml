    step1_eyebrow: Schritt 1 · Struktur
    layout_title: Menü-Layout
    layout_desc: Wählen Sie, wie die Gerichte auf dem Bildschirm angeordnet werden.
    step2_eyebrow: Schritt 2 · Erscheinungsbild
