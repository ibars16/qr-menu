toast:
    save_error: Fehler beim Speichern
    applied: '✓ Änderung erfolgreich angewendet'
    connection_error: Verbindungsfehler

layout:
    standard:
        name: Standard
        desc: Karten mit Bild oben und Namen unten. Ausgewogen und wirkungsvoll.
    compact:
        name: Kompakte Liste
        desc: Nummerierte Zeilen, schnell zu überblicken. Ideal für lange Speisekarten.
    grid:
        name: Raster
        desc: Vertikale Karten mit großem Bild. Sehr visuell und wirkungsvoll.

theme:
    classic-dark:
        name: Klassisch dunkel
        desc: Schwarzer Hintergrund mit Ihrer Markenfarbe als Akzent. Elegant und edel.
    classic-warm:
        name: Klassisch warm
        desc: Cremefarbener Hintergrund, warme Töne. Gemütlich und einladend.
    glass:
        name: Glassmorphism
        desc: Dunkler Verlauf mit Glaseffekt und violettem Akzent. Modern und hochwertig.
    ocean:
        name: Ozean
        desc: Hellblau, klar und frisch. Ideal für Fischrestaurants.
    noir:
        name: Noir
        desc: Tiefschwarz mit goldenen Details. Luxus und gehobene Gastronomie.
    forest:
        name: Wald
        desc: Natürliches, organisches Grün. Perfekt für Marktküche und regionale Produkte.
    terra:
        name: Terra
        desc: Mediterrane Terrakotta. Ideal für Tapas, Pintxos und lässige Küche.
