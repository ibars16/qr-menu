layout:
    standard:
        name: Standard
        desc: Cards with an image on top and the name below. Balanced and eye-catching.
    compact:
        name: Compact list
        desc: Numbered rows, quick to scan. Ideal for long menus.
    grid:
        name: Grid
        desc: Vertical cards with a large image. Very visual and eye-catching.

theme:
    classic-dark:
        name: Classic dark
        desc: Black background with your brand color as the accent. Elegant and sophisticated.
    classic-warm:
        name: Classic warm
        desc: Cream background, warm tones. Cozy and welcoming.
    glass:
        name: Glassmorphism
        desc: Dark gradient with a glass effect and a purple accent. Modern and premium.
    ocean:
        name: Ocean
        desc: Light blue, clean and fresh. Ideal for seafood restaurants.
    noir:
        name: Noir
        desc: Deep black with gold details. Luxury and fine dining.
    forest:
        name: Forest
        desc: Natural, organic green. Perfect for market-style and local produce cuisine.
    terra:
        name: Terra
        desc: Mediterranean terracotta. Ideal for tapas, pintxos and casual dining.
