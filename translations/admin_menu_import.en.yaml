title: Import Menu

action:
    back_to_menu: Back to menu

upload:
    intro: 'Upload photos of your printed menu and we''ll read them for you — one photo per page is fine.'
    drop_text: Drag your menu photos here, or tap to choose files
    drop_hint: Add as many as you need
    submit: Start reading my menu
    error:
        no_files: Please choose at least one photo.
        too_many_files: 'Please upload %max% photos or fewer at a time.'
        invalid_file: '"%name%" couldn''t be uploaded — please try again.'
        unsupported_type: '"%name%" isn''t a supported photo type. Please use JPEG, PNG, or WebP.'
        storage_failed: '"%name%" couldn''t be saved — please try again.'

status:
    title: 'Photos uploaded (%count%)'
    subtitle: We're reading your menu now — this page will update automatically.
    page_label: 'Page %position%'
    page_status:
        pending: Uploaded
        analyzing: Analyzing…
        extracted: Read
        failed: Failed

complete:
    title_success: Your menu is ready to review
    subtitle_success: We've added your dishes to the menu, hidden from customers until you review them.
    subtitle_partial_failure: ' We couldn''t read %failed% of your %total% photos — you can try uploading those again separately.'
    stat_categories: Categories
    stat_products: Dishes
    button_continue: View my menu
    title_failed: We couldn't read your menu
    subtitle_failed: None of your photos could be processed. Please check they're clear, well-lit photos of a menu and try again.
    button_retry: Try again
