# Starter Global Ingredient → Allergen mapping.
#
# NOT a comprehensive dataset — deliberately so. Every row here was verified
# by hand against config/global_ingredients.csv (a name unambiguous enough
# to tag with confidence: "butter", not "peanut butter"; "milk", but never
# "coconut milk"/"oat milk"/"soy milk", which are plant-based and must not
# carry the Milk allergen). Covering the full ~4,700-ingredient library
# properly needs a real, licensed ingredient/allergen reference dataset —
# the same "import from a reliable source, never invent it" principle this
# app's ingredient importer already follows. Re-run
# `app:allergens:seed-global-ingredient-links` any time this file grows.
links:

  # Milk
  - ingredient: butter
    allergen: milk
    presence: contains
