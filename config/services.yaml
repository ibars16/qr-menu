parameters:
    exchange_api_key:  '%env(EXCHANGE_API_KEY)%'
    gemini_api_key:    '%env(GEMINI_API_KEY)%'

services:

    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Service\ExchangeRateUpdater:
        arguments:
            $exchangeApiKey: '%exchange_api_key%'

    App\Service\DefaultTagSeeder:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\AdminLocaleResolver:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\MenuPreferencesResolver:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\SeedPresetTagsCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\GenerateGlobalIngredientsDatasetCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\ImportGlobalIngredientsCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $geminiApiKey: '%gemini_api_key%'

    App\Service\GeminiTagTranslator:
        arguments:
            $geminiApiKey: '%gemini_api_key%'

    App\Service\TagTranslatorInterface:
        alias: App\Service\GeminiTagTranslator

    App\Service\GeminiIngredientTranslator:
        arguments:
            $geminiApiKey: '%gemini_api_key%'

    App\Service\IngredientTranslatorInterface:
        alias: App\Service\GeminiIngredientTranslator

    App\Service\TagTranslationProviderInterface:
        alias: App\Service\DatabaseTagTranslationProvider

    App\Service\AllergenSeeder:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\GlobalIngredientAllergenSeeder:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\Classification\GeminiClassifierProvider:
        arguments:
            $geminiApiKey: '%gemini_api_key%'

    App\Service\Classification\AiClassifierProviderInterface:
        alias: App\Service\Classification\GeminiClassifierProvider

    App\Command\ClassifyExportCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\AI\AIProviderFactory:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\AI\AIModelRouter:
        arguments:
            $logger: '@monolog.logger.smart_waiter'

    App\Service\AI\ChatComplexityClassifierInterface:
        alias: App\Service\AI\HeuristicChatComplexityClassifier
