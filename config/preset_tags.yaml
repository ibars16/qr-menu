  # Editorial highlight, not a sales/popularity metric the platform doesn't
  # have — the wording is deliberately framed as the owner's own
  # recommendation rather than an implied "most ordered" claim. This is the
  # single signal the future Smart Waiter is allowed to use when a customer
  # asks what's popular, recommended, or the best seller: it must look for
  # products carrying a ProductTag with code "recommended" and cite only
  # those — and say plainly that nothing has been marked yet if this tag
  # hasn't been assigned to any product, rather than guessing.
  - code: recommended
    icon: "⭐"
    color: "#D4AF37"
    position: 8
    translations:
